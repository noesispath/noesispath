services:
  api:
    build: .
    container_name: noesispath-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/requirements.txt:/app/requirements.txt
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env.docker
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: noesispath-db
    restart: always
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # frontend-ui:
  #   build: ./frontend-ui
  #   ports:
  #     - "5173:5173"
  #   volumes:
  #     - ./frontend-ui:/app
  #   depends_on:
  #     - api

volumes:
  pgdata:
